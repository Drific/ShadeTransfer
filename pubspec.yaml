name: shade_transfer
description: "ShadeTransfer - P2P File Transfer Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # WebRTC for P2P connection
  flutter_webrtc: ^0.12.5

  # QR Code generation and scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # File picking & image picking (for QR from image)
  file_picker: ^8.0.0+1
  image_picker: ^1.1.2

  # Encryption
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # State management
  provider: ^6.1.2

  # Path handling
  path_provider: ^2.1.3
  path: ^1.9.0

  # UI components
  percent_indicator: ^4.2.3

  # Logging
  logger: ^2.4.0

  # Platform info
  device_info_plus: ^10.1.2
  connectivity_plus: ^6.0.5

  # Notifications
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

  # Windows MSIX packaging
  msix: ^3.16.8

flutter:
  uses-material-design: true

msix_config:
  display_name: ShadeTransfer
  publisher_display_name: Drific
  identity_name: com.shade.transfer
  msix_version: 1.0.0.2
  capabilities: internetClient, privateNetworkClientServer
  languages: zh-CN, en-US
  install_certificate: true
